baseURL = "https://eunbc.github.io/"
locale = "ko-kr"
defaultContentLanguage = "ko"
title = "eunbc"
theme = ["PaperMod"]
enableRobotsTXT = true
enableEmoji = true
ignoreLogs = ['warning-partial-superfluous-prefix']

# baseURL 단일 source-of-truth: 빌드 시 GitHub Actions가
# `--baseURL ${{ steps.pages.outputs.base_url }}/`로 재주입한다.
# 위 값은 로컬 개발용 fallback이며 production에서는 CLI 인자가 우선함.

[params]
author = "eunbc"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowToc = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowBreadCrumbs = false
ShowPostNavLinks = true
ShowRssButtonInSectionTermList = false
DateFormat = "2006-01-02"
description = "Curated notes & portfolio"

[params.homeInfoParams]
Title = "Everything starts with *why*."
Content = """
'왜'라는 질문에서 시작하고, 데이터로 검증하고, 구조로 남기는 백엔드 엔지니어 조은비입니다.
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/eunbc"

[[params.socialIcons]]
name = "email"
url = "mailto:joeunbi0514@gmail.com"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/eunbi-cho-78b5201b8/"

[params.assets]
disableHLJS = false
disableFingerprinting = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "books"
name = "Books"
url = "/books/"
weight = 15

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30

[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = false
noClasses = false
style = "monokai"

[markup.goldmark.renderer]
unsafe = true
