baseURL = "https://eunbc.github.io/"
locale = "ko-kr"
defaultContentLanguage = "ko"
title = "eunbc"
theme = ["PaperMod"]
enableRobotsTXT = true
enableEmoji = true
ignoreLogs = ['warning-partial-superfluous-prefix']

# baseURL 단일 source-of-truth: 빌드 시 GitHub Actions가
# `--baseURL ${{ steps.pages.outputs.base_url }}/`로 재주입한다.
# 위 값은 로컬 개발용 fallback이며 production에서는 CLI 인자가 우선함.

[params.author]
name = "eunbc"
email = "joeunbi0514@gmail.com"

[params]
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowToc = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowBreadCrumbs = false
ShowPostNavLinks = true
ShowRssButtonInSectionTermList = true
DateFormat = "2006-01-02"
description = "Curated notes & portfolio"

[params.homeInfoParams]
Title = "안녕하세요, eunbc 입니다 👋"
Content = """
백엔드/풀스택 영역에서 작업하며 배운 것들을 천천히 정리합니다.
이 공간은 포트폴리오이자 개인 아카이브예요.
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/eunbc"

[[params.socialIcons]]
name = "email"
url = "mailto:joeunbi0514@gmail.com"

[params.assets]
disableHLJS = false
disableFingerprinting = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 40

[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = false
noClasses = false
style = "monokai"

[markup.goldmark.renderer]
unsafe = true
